<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Room Not Found</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f9fafb, #edf1f7);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .card {
            background: #ffffff;
            width: 460px;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            animation: slideFade 0.7s ease;
        }

        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #6c757d;
            font-size: 14px;
            margin: 15px 0 30px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            background: #f4b400;
            color: #ffffff;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #d49f00;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🏨</div>
    <h1>Room Not Found</h1>
    <p>The requested room number is not available in the system.</p>
    <a th:href="@{/get-all-rooms}" class="btn">View Rooms</a>
</div>

</body>
</html>
