<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservation Not Found</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f4f6fb, #e5ebf3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .card {
            background: #ffffff;
            width: 480px;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            animation: fadeScale 0.6s ease;
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #6c757d;
            font-size: 14px;
            margin: 15px 0 30px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            background: #20c997;
            color: #ffffff;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #17a589;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">📄</div>
    <h1>Reservation Not Found</h1>
    <p>The reservation you are trying to access could not be located.</p>
    <a th:href="@{/reservation-search}" class="btn">Search Again</a>
</div>

</body>
</html>
