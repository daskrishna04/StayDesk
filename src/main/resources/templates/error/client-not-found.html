<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Not Found</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f8fafc, #e9eef5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .card {
            background: #ffffff;
            width: 460px;
            padding: 45px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.7s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            background: #2c7be5;
            color: #ffffff;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #1a5fd0;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">👤</div>
    <h1>Client Not Found</h1>
    <p>The client details you are searching for do not exist in our records.</p>
    <a th:href="@{/dashboard}" class="btn">Go to Home</a>
</div>

</body>
</html>
