<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Reservation</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f3f6fb, #e9eef6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 520px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-weight: 500;
        }

        label {
            font-size: 13px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 6px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #dcdcdc;
            font-size: 14px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #6c7cff;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #6c7cff, #8a9bff);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
    </style>

    <script>
        function updatePlaceholder() {
            const type = document.getElementById("searchType").value;
            const input = document.getElementById("searchValue");

            if (type === "reservationId") {
                input.placeholder = "Enter Reservation ID";
            } else if (type === "aadhaar") {
                input.placeholder = "Enter Aadhaar Number";
            } else if (type === "roomNo") {
                input.placeholder = "Enter Room Number";
            }
        }
    </script>
</head>

<body>

<div class="card">
    <h2>Search Reservation</h2>

    <form th:action="@{/reservation/reservation-confirm}" method="get">

        <label>Select Search Type</label>
        <select id="searchType" name="type" onchange="updatePlaceholder()" required>
            <option value="" disabled selected>Choose an option</option>
            <option value="reservationId">Reservation ID</option>
            <option value="aadhaar">Aadhaar ID</option>
            <option value="roomNo">Room Number</option>
        </select>

        <label>Search Value</label>
        <input type="text" id="searchValue" name="value" placeholder="Select search type first" required />

        <button type="submit">Search</button>

        <div class="note">
            Search active reservations quickly and securely
        </div>
    </form>
</div>

</body>
</html>
