<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>User Registration - StayDesk</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #1a1a40, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 370px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            background: linear-gradient(45deg, #a855f7, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin: 15px 0;
            text-align: left;
        }

        label {
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input:focus, select:focus {
            box-shadow: 0 0 8px #a855f7;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .register-btn {
            background: linear-gradient(45deg, #a855f7, #ffd700);
            color: black;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(168,85,247,0.6);
        }

        .error {
            margin-top: 10px;
            color: #ff4d4d;
            font-size: 14px;
        }

    </style>
</head>

<body>

<form th:action="@{/auth/register}" th:object="${signup}" method="post">

<div class="container">

    <h2>Create User</h2>

    <div id="error" class="error"></div>

    <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" id="username" placeholder="Enter username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" id="password" placeholder="Enter password">
    </div>

    <div class="input-group">
        <label>Role</label>
        <select th:field="*{role}" id="role">
            <!-- ADMIN can see both -->
            <div sec:authorize="hasRole('ADMIN')">
                <option value="ROLE_ADMIN">Admin</option>
                <option value="ROLE_MANAGER">Manager</option>
            </div>
            <!-- MANAGER can see only this -->
            <div sec:authorize="hasRole('MANAGER')">
                <option value="ROLE_RECEPTIONIST">Receptionist</option>
            </div>
        </select>
    </div>

    <button type="submit" class="btn register-btn">Register</button>

</div>
</form>
</body>
</html>
