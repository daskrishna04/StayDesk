<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Client Registration</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(120deg, #f1f4f9, #e6ebf1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card h2 {
            text-align: center;
            color: #3b4a5a;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: #6c7a89;
            margin-bottom: 6px;
        }

        .field input,
        .field textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #dce3ea;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: #9bb7d4;
            box-shadow: 0 0 0 3px rgba(155,183,212,0.25);
        }

        textarea {
            resize: none;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn {
            width: 48%;
            padding: 10px 0;
            border-radius: 25px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-register {
            background: #9bb7d4;
            color: #ffffff;
        }

        .btn-register:hover {
            background: #89a9c8;
            transform: translateY(-2px);
        }

        .btn-home {
            background: #eef2f6;
            color: #5a6b7c;
        }

        .btn-home:hover {
            background: #e1e7ed;
            transform: translateY(-2px);
        }
        .error {
            color: #d9534f;
            font-size: 13px;
            margin-top: 4px;
        }
        input.error-field {
            border-color: #d9534f;
        }

    </style>
</head>

<body>

<div class="card">
    <h2>Client Registration</h2>

    <form th:action="@{/client/register-client}" th:object="${client}" method="post">

        <div class="field">
            <label>Full Name</label>
            <input type="text"
                   th:field="*{clientName}"
                   th:classappend="${#fields.hasErrors('clientName')} ? 'error-field'">
            <div class="error" th:if="${#fields.hasErrors('clientName')}"
                 th:errors="*{clientName}"></div>

        </div>

        <div class="field">
            <label>Address</label>
            <input type="text"
                   th:field="*{address}"
                   th:classappend="${#fields.hasErrors('address')} ? 'error-field'">
            <div class="error" th:errors="*{address}"></div>

        </div>

        <div class="field">
            <label>Phone Number</label>
            <input type="text"
                   th:field="*{phoneNumber}"
                   th:classappend="${#fields.hasErrors('phoneNumber')} ? 'error-field'">
            <div class="error" th:errors="*{phoneNumber}"></div>

        </div>

        <div class="field">
            <label>Aadhaar Number</label>
            <input type="text"
                   th:field="*{aadhaarNumber}"
                   th:classappend="${#fields.hasErrors('aadhaarNumber')} ? 'error-field'">
            <div class="error" th:errors="*{aadhaarNumber}"></div>

        </div>

        <div class="field">
            <label>Check-In Date & Time</label>
            <input type="datetime-local"
                   th:field="*{checkInTime}"
                   th:classappend="${#fields.hasErrors('checkInTime')} ? 'error-field'">
            <div class="error" th:errors="*{checkInTime}"></div>

        </div>

        <div class="field">
            <label>Check-Out Date & Time</label>
            <input type="datetime-local"
                   th:field="*{checkOutTime}"
                   th:classappend="${#fields.hasErrors('checkOutTime')} ? 'error-field'">
            <div class="error" th:errors="*{checkOutTime}"></div>

        </div>

        <div class="button-group">
            <button type="submit" class="btn btn-register">Register</button>
            <button type="button"
                    class="btn btn-home"
                    th:onclick="|window.location.href='@{/dashboard}'|">
                Home
            </button>
        </div>

    </form>
</div>

</body>
</html>
