<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Registered Successfully</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa, #e4ecf5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-card {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 14px;
            width: 420px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon {
            font-size: 60px;
            color: #4caf50;
            margin-bottom: 10px;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .btn-home {
            background: #1976d2;
            color: #ffffff;
        }

        .btn-home:hover {
            background: #125ea9;
        }

        .btn-new {
            background: #f1f4f8;
            color: #333;
            border: 1px solid #ccc;
        }

        .btn-new:hover {
            background: #e2e6ea;
        }
    </style>
</head>

<body>

<div class="success-card">
    <div class="icon">✔</div>

    <h2>Client Registered Successfully</h2>

    <p>
        The client details have been saved successfully.
        You may proceed with check-in or register another client.
    </p>

    <div class="btn-group">
        <a th:href="@{/dashboard}" class="btn btn-home">Home</a>
        <a th:href="@{/client/register-client}" class="btn btn-new">Register Another</a>
    </div>
</div>

</body>
</html>
