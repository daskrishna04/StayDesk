<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Directory</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2f7, #f9fbfd);
            padding: 40px;
        }

        .container {
            max-width: 1250px;
            margin: auto;
            background: #ffffff;
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            animation: fadeIn 0.9s ease;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        th {
            padding: 14px;
            color: #ffffff;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 12px;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ecf0f1;
            color: #34495e;
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: #f4f7fb;
            transform: scale(1.01);
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 15px;
        }

        /* ===== Action Buttons ===== */
        .actions a {
            text-decoration: none;
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin: 0 4px;
            display: inline-block;
            transition: 0.3s ease;
        }

        .view {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: #fff;
        }

        .view:hover {
            box-shadow: 0 6px 18px rgba(54,209,220,0.5);
            transform: translateY(-2px);
        }

        .delete {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff;
        }

        .delete:hover {
            box-shadow: 0 6px 18px rgba(255,65,108,0.5);
            transform: translateY(-2px);
        }

        /* ===== Footer Buttons ===== */
        .footer-buttons {
            margin-top: 35px;
            text-align: center;
        }

        .footer-buttons a {
            text-decoration: none;
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            margin: 0 10px;
            display: inline-block;
            transition: 0.3s ease;
        }

        .home-btn {
            background: linear-gradient(135deg, #bdc3c7, #ecf0f1);
            color: #2c3e50;
        }

        .home-btn:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }

        .add-btn {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
        }

        .add-btn:hover {
            box-shadow: 0 8px 20px rgba(17,153,142,0.45);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Client Directory</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Aadhaar</th>
            <th>Check-In</th>
            <th>Check-Out</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="client : ${clients}">
            <td th:text="${client.clientId}"></td>
            <td th:text="${client.clientName}"></td>
            <td th:text="${client.phoneNumber}"></td>
            <td th:text="${client.aadhaarNumber}"></td>
            <td th:text="${client.checkInTime}"></td>
            <td th:text="${client.checkOutTime}"></td>

            <td class="actions">
                <a th:href="@{/client/view/{id}(id=${client.clientId})}" class="view">
                    Update
                </a>
                <a th:href="@{/client/delete-client/{id}(id=${client.clientId})}"
                   class="delete"
                   onclick="return confirm('Are you sure you want to delete this client?');">
                    Delete
                </a>
            </td>
        </tr>

        <tr th:if="${clients.size() == 0}">
            <td colspan="7" class="empty">
                No clients found in the system.
            </td>
        </tr>
        </tbody>
    </table>

    <div class="footer-buttons">
        <a th:href="@{/dashboard}" class="home-btn">Home</a>
        <a th:href="@{/client/register-client}" class="add-btn">Add Client</a>
    </div>
</div>

</body>
</html>
