<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Rooms</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #ffffff;
            border-radius: 22px;
            padding: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
            animation: fadeIn 0.9s ease;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1f2937;
            font-weight: 600;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #f1f5f9;
        }

        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            color: #334155;
            font-weight: 600;
        }

        tbody tr:hover {
            background: #f8fafc;
            transition: 0.3s;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .available {
            background: #dcfce7;
            color: #166534;
        }

        .booked {
            background: #fee2e2;
            color: #991b1b;
        }

        .actions a {
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 18px;
            font-size: 12px;
            margin: 0 4px;
            transition: 0.3s ease;
        }

        .edit {
            background: #e0f2fe;
            color: #0369a1;
        }

        .edit:hover {
            background: #bae6fd;
        }

        .delete {
            background: #fee2e2;
            color: #991b1b;
        }

        .delete:hover {
            background: #fecaca;
        }

        .footer-buttons {
            margin-top: 30px;
            text-align: center;
        }

        .footer-buttons a {
            text-decoration: none;
            padding: 12px 26px;
            border-radius: 30px;
            font-size: 14px;
            margin: 0 10px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            transition: 0.3s ease;
        }

        .footer-buttons a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: #6b7280;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>All Rooms</h2>

    <table>
        <thead>
        <tr>
            <th>Room No</th>
            <th>Type</th>
            <th>Price / Night (₹)</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="room : ${rooms}">
            <td th:text="${room.roomNo}"></td>
            <td th:text="${room.type}"></td>
            <td th:text="${room.pricePerNight}"></td>

            <td>
                <span th:if="${room.availabilityStatus}"
                      class="status available">Available</span>

                <span th:if="${!room.availabilityStatus}"
                      class="status booked">Booked</span>
            </td>

            <td class="actions">
                <a th:href="@{/room/edit/{id}(id=${room.roomNo})}" class="edit">Edit</a>
                <a th:href="@{/room/delete/{id}(id=${room.roomNo})}"
                   class="delete"
                   onclick="return confirm('Are you sure you want to delete this room?');">
                    Delete
                </a>
            </td>
        </tr>

        <tr th:if="${rooms.size() == 0}">
            <td colspan="5" class="empty">
                No rooms available in the system.
            </td>
        </tr>
        </tbody>
    </table>

    <div class="footer-buttons">
        <a th:href="@{/dashboard}">Home</a>
        <a th:href="@{/room/register-room}">Add Room</a>
    </div>
</div>

</body>
</html>
