<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register New Room</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.9s ease;
        }

        .card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 8px rgba(42,82,152,0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button {
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: #fff;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .btn-home {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #2c3e50;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Register New Room</h2>

    <form th:action="@{/register-room}" th:object="${room}" method="post">

        <!-- Room No -->
        <div class="form-group">
            <label>Room Number</label>
            <input type="number" th:field="*{roomNo}" placeholder="Enter room number">
            <div class="error" th:if="${#fields.hasErrors('roomNo')}"
                 th:errors="*{roomNo}"></div>
        </div>

        <!-- Room Type -->
        <div class="form-group">
            <label>Room Type</label>
            <select th:field="*{roomType}">

                    <option value="">Select Room Type</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Deluxe">Deluxe</option>
                    <option value="Executive">Executive</option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('roomType')}"
                 th:errors="*{roomType}"></div>
        </div>

        <!-- Price -->
        <div class="form-group">
            <label>Price Per Night (₹)</label>
            <input type="number" th:field="*{pricePerNight}" placeholder="2000 - 10000">
            <div class="error" th:if="${#fields.hasErrors('pricePerNight')}"
                 th:errors="*{pricePerNight}"></div>
        </div>

        <!-- Availability -->
        <div class="form-group checkbox-group">
            <input type="checkbox" th:field="*{availabilityStatus}">
            <label>Available</label>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button type="submit" class="btn-save">Save Room</button>
            <a th:href="@{/dashboard}">
                <button type="button" class="btn-home">Home</button>
            </a>
        </div>

    </form>
</div>

</body>
</html>
