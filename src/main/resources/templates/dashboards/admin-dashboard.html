<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Luxury Hotel Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #fdfefe);
            min-height: 100vh;
            display: flex;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
            padding: 35px 25px;
            color: #fff;
            box-shadow: 8px 0 30px rgba(0,0,0,0.25);
        }

        .brand {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand h2 {
            font-weight: 600;
            letter-spacing: 2px;
            color: #f4c430;
        }

        .brand span {
            font-size: 12px;
            opacity: 0.8;
        }

        .menu a {
            display: block;
            padding: 15px 18px;
            margin-bottom: 14px;
            border-radius: 14px;
            text-decoration: none;
            color: #ecf0f1;
            transition: all 0.35s ease;
            font-weight: 500;
        }

        .menu a:hover {
            background: linear-gradient(135deg, #f4c430, #ffd97a);
            color: #1e3c72;
            transform: translateX(8px);
        }

        /* Make button look exactly like anchor */
        .menu .lgt-btn {
            display: block;
            width: 100%;
            padding: 15px 18px;
            margin-bottom: 14px;
            border-radius: 14px;
            border: none;
            background: transparent;
            text-align: left;
            color: #ecf0f1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.35s ease;
        }

        /* 🔥 Logout hover = RED */
        .menu .lgt-btn:hover {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            transform: translateX(8px);
        }
        /* ===== Main ===== */
        .main {
            flex: 1;
            padding: 40px;
            animation: fadeIn 1s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 45px;
        }

        .top-bar h1 {
            font-weight: 600;
            color: #2c3e50;
        }

        .date {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* ===== Cards ===== */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            margin-bottom: 50px;
        }

        .card {
            padding: 32px;
            border-radius: 22px;
            color: #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.18);
            position: relative;
            overflow: hidden;
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.04);
        }

        .card::after {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            right: -50%;
            background: rgba(255,255,255,0.08);
            transform: rotate(30deg);
        }

        .card h3 {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 14px;
        }

        .card p {
            font-size: 34px;
            font-weight: 700;
        }

        .lux-blue {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .lux-green {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .lux-purple {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .lux-gold {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #2c3e50;
        }

        /* ===== Table ===== */
        .section {
            background: #fff;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .section h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: #95a5a6;
            padding: 16px;
            border-bottom: 2px solid #ecf0f1;
        }

        td {
            padding: 12px 16px;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            text-align: center;
        }

        tr:hover {
            background: #f8fbff;
        }

        /* ===== Animation ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <div class="brand">
        <h2>Krishna Regency</h2>
        <span>Luxury Hotel Management</span>
    </div>

    <div class="menu">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/client/get-all-clients}">Clients</a>
        <a th:href="@{/room/get-all-rooms}">Rooms</a>
        <a th:href="@{/reservation/reservation-options}">Reservations</a>
        <a th:href="@{/search-client}">Billing</a>
        <a th:href="@{/dashboard}">Reports</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="lgt-btn" >Logout</button>
        </form>
    </div>
</div>

<!-- ===== Main ===== -->
<div class="main">

    <div class="top-bar">
        <h1>Executive Dashboard</h1>

        <div style="display:flex; align-items:center; gap:20px;">

            <!-- Username -->
            <div style="
            background:#fff;
            padding:10px 18px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            font-weight:500;
            color:#2c3e50;
        ">
                👤 <span sec:authentication="name">Username</span>
            </div>

            <!-- Date -->
            <div class="date"
                 th:text="${#dates.format(#dates.createNow(),'dd MMM yyyy')}">
            </div>

        </div>
    </div>

    <!-- KPI Cards -->
    <div class="cards">
        <div class="card lux-gold">
            <h3>Total Guests</h3>
            <p th:text="${total}">120</p>
        </div>

        <div class="card lux-green">
            <h3>Available Rooms</h3>
            <p th:text="${available}">35</p>
        </div>

        <div class="card lux-purple">
            <h3>Occupied Rooms</h3>
            <p th:text="${occupied}">65</p>
        </div>

        <div class="card lux-gold">
            <h3>Total User</h3>
            <p th:text="${totalUser}" >0</p>
        </div>
    </div>

    <!-- Recent Check-ins -->
    <div class="section">
        <h2>Recent Check-Ins</h2>

        <table>
            <thead>
            <tr>
                <th>Guest Name</th>
                <th>Room No</th>
                <th>Check-In</th>
                <th>Check-Out</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="reservation : ${reservationList}">
                <td th:text="${reservation.client.clientName}">Rahul Sharma</td>
                <td th:text="${reservation.room.roomNo}">305</td>
                <td th:text="${reservation.client.checkInTime}">10:30 AM</td>
                <td th:text="${reservation.client.checkOutTime}">Tomorrow</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
